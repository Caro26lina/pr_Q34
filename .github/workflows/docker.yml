name: Build and push to docker hub
on:
  push:
    branch: [ main ]
jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkcode@v3
      - name: login oi docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD}}
      - name: build the image
        run: docker build -t ${{secrets.DOCKERHUB_USERNAME}}/app1:latest .
      - name: push to the docker hub
        run: docker push ${{secrets.DOCKERHUB_USER}}/app1:latest


